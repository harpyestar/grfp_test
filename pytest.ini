[pytest]
# 项目名称
project = grfp-ui-test

# 测试发现
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --capture=no

# 标记定义
markers =
    auth: 认证相关测试
    operate: 运营端测试
    hotel: 酒店端测试
    hotelgroup: 酒店集团端测试
    e2e: 端到端测试
    smoke: 冒烟测试
    regression: 回归测试

# 测试路径
testpaths = tests

# 日志
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Allure 报告
plugins = allure_pytest
